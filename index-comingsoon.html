<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nalara Academy - Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #0663C7;
      --d-blue: #0053AD;
      --m-blue: #0671E0;
      --azure: #4196F0;
      --sky: #DBEDFF;
      --l-blue: #EEF5FC;
      --d-yellow: #E48900;
      --lemon: #FFA826;
      --m-yellow: #FFB240;
      --straw: #FFC670;
      --bg-dark: #212121;
      --bg-darker: #191919;
      --d-grey: #4D4D4D;
      --grey: #717171;
      --l-grey: #89939E;
      --grey-blue: #ABBED1;
      --silver: #F5F7FA;
      --white: #FFFFFF;
      --border-color: rgba(255, 255, 255, 0.08);
      --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;
      --font-sans: 'Inter', sans-serif;
      --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    html,
    body {
      width: 100%;
      color: var(--silver);
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at top left, rgba(6, 99, 199, 0.12), transparent 45%),
        radial-gradient(circle at center right, rgba(255, 178, 64, 0.05), transparent 40%),
        radial-gradient(circle at bottom left, rgba(0, 83, 173, 0.08), transparent 45%);
      background-attachment: fixed;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleUp {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes floatGentle {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes glowPulse {

      0%,
      100% {
        opacity: 0.15;
        transform: scale(1) translate(0, 0);
      }

      50% {
        opacity: 0.25;
        transform: scale(1.08) translate(15px, -15px);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.4;
      }

      50% {
        transform: scale(1.5);
        opacity: 1;
        box-shadow: 0 0 15px var(--azure);
      }
    }

    @keyframes floatParticle1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(30px, -40px) scale(1.3);
      }
    }

    @keyframes floatParticle2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(-40px, -20px) scale(1.2);
      }
    }

    @keyframes floatParticle3 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(25px, 30px) scale(1.4);
      }
    }

    .stagger-in {
      opacity: 0;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-delay-1 {
      animation-delay: 100ms;
    }

    .animate-delay-2 {
      animation-delay: 200ms;
    }

    .animate-delay-3 {
      animation-delay: 350ms;
    }

    .animate-delay-4 {
      animation-delay: 500ms;
    }

    .animate-delay-5 {
      animation-delay: 650ms;
    }

    /* UI Components */
    .container {
      min-height: 100vh;
      display: flex;
      position: relative;
      overflow: hidden;
      padding: 2rem 1.5rem;
    }

    .glow1 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6, 99, 199, 0.15) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
      animation: glowPulse 12s infinite ease-in-out;
    }

    .glow2 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 168, 38, 0.08) 0%, transparent 70%);
      bottom: -150px;
      right: -100px;
      pointer-events: none;
      animation: glowPulse 15s infinite ease-in-out 3s;
    }

    .particle-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--azure);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--azure);
    }

    .p1 {
      top: 12%;
      left: 8%;
      width: 6px;
      height: 6px;
      animation: pulse 4s infinite ease-in-out, floatParticle1 8s infinite ease-in-out;
    }

    .p2 {
      top: 20%;
      left: 88%;
      width: 9px;
      height: 9px;
      animation: pulse 5s infinite ease-in-out, floatParticle2 10s infinite ease-in-out;
    }

    .p3 {
      top: 82%;
      left: 10%;
      width: 7px;
      height: 7px;
      animation: pulse 6s infinite ease-in-out, floatParticle3 9s infinite ease-in-out;
    }

    .p4 {
      top: 85%;
      left: 85%;
      width: 5px;
      height: 5px;
      animation: pulse 4.5s infinite ease-in-out, floatParticle2 12s infinite ease-in-out reverse;
    }

    .p5 {
      top: 50%;
      left: 5%;
      width: 8px;
      height: 8px;
      animation: pulse 5.5s infinite ease-in-out, floatParticle1 11s infinite ease-in-out reverse;
    }

    .content-card {
      margin: auto;
      max-width: 1000px;
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 3.5rem 3rem;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
      z-index: 10;
      animation: scaleUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards, floatGentle 8s infinite ease-in-out 1s;
      min-height: 75vh;
    }

    .card-left {
      flex: 1.1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
    }

    .card-right {
      flex: 0.9;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      max-width: 220px;
      margin-bottom: 2rem;
    }

    .poster-img {
      width: 100%;
      max-width: 450px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .poster-img:hover {
      transform: translateY(-3px) scale(1.02);
    }

    .badge-tech-accent {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.75rem;
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      letter-spacing: 0.02em;
      background: rgba(255, 168, 38, 0.12);
      color: var(--m-yellow);
      border: 1px solid rgba(255, 168, 38, 0.25);
      align-self: flex-start;
      margin-bottom: 1.5rem;
    }

    .heading {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.8rem;
      letter-spacing: -0.02em;
      font-family: var(--font-display);
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--azure) 0%, var(--lemon) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .description {
      font-size: 1.1rem;
      color: var(--grey-blue);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .cta-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 2.5rem;
    }

    .mobile-hint {
      display: none;
    }

    .cta-heading {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--lemon);
      margin-bottom: 1rem;
      margin-top: 0;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.4;
      text-align: left;
    }

    .nalara-btn-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;http://103.127.139.237:1000/api-docs/
      border-radius: 12px;
      border: none;
      cursor: pointer;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--lemon), var(--d-yellow));
      color: var(--bg-dark);
      box-shadow: 0 0 20px rgba(255, 168, 38, 0.4);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .nalara-btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(255, 168, 38, 0.6);
      background: linear-gradient(135deg, var(--m-yellow), var(--lemon));
    }

    .countdown-container {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0;
    }

    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 65px;
    }

    .countdown-number {
      font-size: 2.5rem;
      font-weight: 800;
      font-family: var(--font-display);
      color: var(--white);
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.85rem;
      color: var(--l-grey);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
    }

    .countdown-separator {
      font-size: 2rem;
      font-weight: 800;
      color: var(--border-color);
      padding-bottom: 0.8rem;
    }

    .text-lemon {
      color: var(--lemon) !important;
    }

    @media (max-width: 900px) {
      .content-card {
        flex-direction: column;
        padding: 2.5rem 1.5rem;
        gap: 2.5rem;
        text-align: center;
      }

      .card-left {
        align-items: center;
        text-align: center;
        order: 1;
        display: flex;
        flex-direction: column;
      }

      .card-right {
        order: 2;
      }

      .badge-tech-accent {
        align-self: center;
      }

      .cta-container {
        order: -1;
        align-items: center;
        width: 100%;
        background: rgba(255, 168, 38, 0.05);
        padding: 1.5rem;
        border-radius: 16px;
        border: 1px solid rgba(255, 168, 38, 0.2);
        margin-bottom: 2rem;
      }
      
      .mobile-hint {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--sky);
        background: rgba(6, 99, 199, 0.4);
        padding: 0.35rem 0.85rem;
        border-radius: 20px;
        margin-bottom: 1rem;
        border: 1px solid rgba(65, 150, 240, 0.3);
        letter-spacing: 0.05em;
        order: 1;
      }

      .nalara-btn-cta {
        order: 2;
        width: 100%;
        max-width: 300px;
      }

      .cta-heading {
        order: 3;
        font-size: 0.85rem;
        font-weight: 600;
        margin-top: 1rem;
        margin-bottom: 0;
        text-align: center;
        width: 100%;
      }

      .countdown-container {
        justify-content: center;
        flex-wrap: nowrap;
        gap: 0.5rem;
      }

      .countdown-item {
        min-width: 50px;
      }

      .countdown-number {
        font-size: 1.8rem;
      }

      .countdown-label {
        font-size: 0.7rem;
      }

      .countdown-separator {
        font-size: 1.5rem;
        padding-bottom: 0.5rem;
      }

      .heading {
        font-size: 2.8rem;
      }

      .poster-img {
        max-width: 320px;
      }

      .logo {
        margin-bottom: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="glow1"></div>
    <div class="glow2"></div>

    <div class="particle-container">
      <div class="particle p1"></div>
      <div class="particle p2"></div>
      <div class="particle p3"></div>
      <div class="particle p4"></div>
      <div class="particle p5"></div>
    </div>

    <div class="content-card">

      <div class="card-left">
        <img src="./public/image/logonalara2.png" alt="Logo Nalara" class="logo stagger-in">

        <h1 class="heading stagger-in animate-delay-2">
          <span class="gradient-text">COMING SOON</span>
        </h1>

        <p class="description stagger-in animate-delay-3">
          Tim PIT Nalara sedang memasak sesuatu yang besar untuk para Future Nalarians
        </p>

        <div class="cta-container stagger-in animate-delay-4">
          <div class="mobile-hint">KLIK DAFTAR SEKARANG</div>
          <h3 class="cta-heading">LIMITED SEATS! ONLY 150! JOINN NOW! 100% OFF! T&C Applied!</h3>
          <a href="https://forms.gle/mRVMULpuokZpVLJZ9" target="_blank" rel="noopener noreferrer"
            class="nalara-btn-cta">
            DAFTAR SEKARANG!
          </a>
        </div>

        <div class="countdown-container stagger-in animate-delay-5">
          <div class="countdown-item">
            <span class="countdown-number" id="days">00</span>
            <span class="countdown-label">Hari</span>
          </div>
          <div class="countdown-separator">:</div>
          <div class="countdown-item">
            <span class="countdown-number" id="hours">00</span>
            <span class="countdown-label">Jam</span>
          </div>
          <div class="countdown-separator">:</div>
          <div class="countdown-item">
            <span class="countdown-number" id="minutes">00</span>
            <span class="countdown-label">Menit</span>
          </div>
          <div class="countdown-separator">:</div>
          <div class="countdown-item">
            <span class="countdown-number text-lemon" id="seconds">00</span>
            <span class="countdown-label">Detik</span>
          </div>
        </div>
      </div>

      <div class="card-right">
        <img src="./public/image/PosterNalara.png" alt="Poster" class="poster-img stagger-in animate-delay-1">
      </div>

    </div>
  </div>

  <script>
    // Target date for the launch: Wednesday, 22 Juli 2026 13:00 (Technical Meeting)
    const targetDate = new Date('2026-07-20T13:00:00').getTime();

    function calculateTime() {
      const now = new Date().getTime();
      const difference = targetDate - now;

      if (difference <= 0) {
        document.getElementById('days').innerText = '00';
        document.getElementById('hours').innerText = '00';
        document.getElementById('minutes').innerText = '00';
        document.getElementById('seconds').innerText = '00';
        return;
      }

      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((difference % (1000 * 60)) / 1000);

      document.getElementById('days').innerText = String(days).padStart(2, '0');
      document.getElementById('hours').innerText = String(hours).padStart(2, '0');
      document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
      document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
    }

    calculateTime();
    setInterval(calculateTime, 1000);
  </script>
</body>

</html>
